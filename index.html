<!DOCTYPE html>
<html>
<head>
    <title>简单猜数字游戏</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; margin-top: 50px; }
        input, button { padding: 8px; font-size: 16px; }
    </style>
</head>
<body>
    <h1>猜数字游戏</h1>
    <p>我已经想好了一个1-100之间的数字，试试猜出来吧！</p>
    <input type="number" id="guess" min="1" max="100">
    <button onclick="checkGuess()">猜一猜</button>
    <p id="message"></p>

    <script>
        const secret = Math.floor(Math.random() * 100) + 1;
        let attempts = 0;
        
        function checkGuess() {
            const guess = parseInt(document.getElementById('guess').value);
            attempts++;
            
            if (isNaN(guess)) {
                document.getElementById('message').textContent = "请输入有效数字！";
            } else if (guess === secret) {
                document.getElementById('message').textContent = `恭喜！你用了${attempts}次猜中了！`;
            } else {
                document.getElementById('message').textContent = 
                    `不对，数字比${guess}要${guess > secret ? '小' : '大'}。再试一次！`;
            }
        }
    </script>
</body>
</html>
