<!DOCTYPE html>
<html>
<head>
    <title>点击方块游戏</title>
    <style>
        body { text-align: center; font-family: Arial; }
        #game { width: 400px; height: 300px; margin: 0 auto; position: relative; border: 1px solid #000; }
        .block { width: 50px; height: 50px; background-color: red; position: absolute; cursor: pointer; }
        #score { font-size: 24px; margin-bottom: 20px; }
    </style>
</head>
<body>
    <h1>点击方块游戏</h1>
    <div id="score">分数: 0</div>
    <div id="game"></div>

    <script>
        let score = 0;
        const game = document.getElementById('game');
        const scoreDisplay = document.getElementById('score');
        
        function createBlock() {
            const block = document.createElement('div');
            block.className = 'block';
            
            // 随机位置
            const x = Math.random() * (game.offsetWidth - 50);
            const y = Math.random() * (game.offsetHeight - 50);
            
            block.style.left = x + 'px';
            block.style.y = y + 'px';
            
            // 点击事件
            block.addEventListener('click', () => {
                score++;
                scoreDisplay.textContent = `分数: ${score}`;
                game.removeChild(block);
                createBlock();
            });
            
            game.appendChild(block);
            
            // 3秒后消失
            setTimeout(() => {
                if (block.parentNode === game) {
                    game.removeChild(block);
                    createBlock();
                }
            }, 1000);
        }
        
        // 开始游戏
        createBlock();
    </script>
</body>
</html>
